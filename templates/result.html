<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop - Prediction Result</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background-color: #2c3e50; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h2 { color: white; font-size: 1.5rem; }
        .navbar a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 500; transition: color 0.3s; }
        .navbar a:hover { color: #2ecc71; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .result-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.08); text-align: center; max-width: 500px; width: 100%; border-top: 5px solid #2ecc71; }
        .icon { font-size: 4rem; margin-bottom: 1rem; animation: pop 0.6s ease-out; }
        h3 { color: #7f8c8d; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .crop-name { color: #27ae60; font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; text-transform: capitalize; }
        .btn { display: inline-block; background-color: #2c3e50; color: white; padding: 0.8rem 2rem; border-radius: 6px; text-decoration: none; font-weight: 500; transition: all 0.3s ease; border: none; cursor: pointer; }
        .btn:hover { background-color: #1a252f; transform: translateY(-2px); }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🌾 OptiCrop</h2>
        <div>
            <a href="/home">Home</a>
            <a href="/about">About</a>
            <a href="/findyourcrop">Find Your Crop</a>
        </div>
    </div>
    <div class="container">
        <div class="result-card">
            <div class="icon">🌱</div>
            <h3>Recommended Crop</h3>
            <div class="crop-name">{{ crop }}</div>
            <a href="/findyourcrop" class="btn">Predict Again</a>
        </div>
    </div>
</body>
</html>
