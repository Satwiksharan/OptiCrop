<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OptiCrop - Find Your Crop</title>
</head>
<body>
    <h2>Crop Prediction Form</h2>
    <form action="/predict" method="POST">
        <label>Nitrogen (N):</label><input type="text" name="N"><br><br>
        <label>Phosphorous (P):</label><input type="text" name="P"><br><br>
        <label>Potassium (K):</label><input type="text" name="K"><br><br>
        <label>Temperature:</label><input type="text" name="temperature"><br><br>
        <label>Humidity:</label><input type="text" name="humidity"><br><br>
        <label>pH:</label><input type="text" name="ph"><br><br>
        <label>Rainfall:</label><input type="text" name="rainfall"><br><br>
        <input type="submit" value="Predict">
    </form>
</body>
</html>
